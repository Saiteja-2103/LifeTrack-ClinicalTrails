<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LifeTrack – Clinical Trial Management</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="LifeTrack Clinical Trial Management System">

  <!--
    Content Security Policy — limits the blast radius of any XSS by restricting
    which origins can serve scripts, styles, fonts, images, and which origins
    the app may connect to via XHR/fetch/WebSocket.
    'unsafe-inline' on styles is required for Angular component-scoped CSS.
    'unsafe-eval' would be required only in dev for HMR — keep it off in prod.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self';
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src    'self' https://fonts.gstatic.com data:;
    img-src     'self' data: blob:;
    connect-src 'self' http://localhost:5046 https://api.lifetrack.example.com;
    frame-ancestors 'none';
    base-uri    'self';
    form-action 'self';
  ">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
